<!DOCTYPE html>

<html lang="en">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Magsikhay Admin Dashboard
</title>



<link rel="stylesheet" href="css/style.css">



</head>



<body>



<header>


<div class="logo">

📚 MAGSIKHAY ADMIN

</div>



<button id="logoutBtn">

🚪 Logout

</button>



</header>






<section class="section">


<h1>

Admin Dashboard

</h1>



<p>

Manage researches, announcements, and content.

</p>



</section>






<section class="section">



<div id="stats"

class="researchGrid">



<div class="card">

<h2>
📚 Research
</h2>


<h1 id="researchCount">
0
</h1>


</div>





<div class="card">


<h2>
📢 Announcements
</h2>


<h1 id="announcementCount">
0
</h1>


</div>




</div>



</section>







<section class="section">


<div class="card">


<h2>
✍️ Add Research
</h2>



<input 
id="title"
placeholder="Research Title"
>




<textarea

id="content"

placeholder="Research Content">

</textarea>




<button id="saveResearch">

Save Research

</button>



</div>


</section>







<section class="section">


<h2>

Research List

</h2>



<div id="researchList">


Loading...

</div>



</section>







<script type="module" src="js/authGuard.js"></script>

<script type="module" src="js/admin.js"></script>



</body>

</html>
