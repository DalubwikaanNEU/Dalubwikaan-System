<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Magsikhay | Admin Dashboard
</title>


<link rel="stylesheet" href="css/style.css">


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


</head>



<body>


<!-- ================= HEADER ================= -->


<header class="adminHeader">


<div class="logo">

📚 MAGSIKHAY ADMIN

</div>



<div class="adminActions">


<button id="themeToggle">

🌙 Dark Mode

</button>



<button id="logoutBtn">

🚪 Logout

</button>


</div>


</header>





<!-- ================= MAIN ================= -->


<main class="container">



<section class="hero">


<h1>

Admin Dashboard

</h1>


<p>

Magsikhay Management System

<br>

Magsikhay. Manaliksik. Makatao.

</p>


</section>








<!-- ================= STATISTICS ================= -->


<section class="dashboardGrid">



<div class="card">


<h2>
📚 Researches
</h2>


<h1 id="researchCount">

0

</h1>


</div>





<div class="card">


<h2>
📢 Announcements
</h2>


<h1 id="announcementCount">

0

</h1>


</div>




<div class="card">


<h2>
👤 Admin Status
</h2>


<h1>

ONLINE

</h1>


</div>



</section>









<!-- ================= ADD RESEARCH ================= -->



<section class="card">


<h2>

✍️ Publish Research

</h2>




<input

id="title"

type="text"

placeholder="Research Title"

>




<input

id="author"

type="text"

placeholder="Author Name"

>




<select id="category">


<option value="Linggwistika">

Linggwistika

</option>


<option value="Panitikan">

Panitikan

</option>


<option value="Kultura">

Kultura

</option>


<option value="Wika">

Wika

</option>


<option value="Iba pa">

Iba pa

</option>


</select>







<input

id="image"

type="url"

placeholder="Image URL (optional)"

>







<textarea

id="content"

placeholder="Write research content here..."

></textarea>






<button

id="saveResearch"

class="btn"

>

💾 Save Research

</button>



</section>









<!-- ================= RESEARCH LIST ================= -->



<section class="card">


<h2>

📖 Research Library

</h2>




<div class="searchBox">


<input

id="searchResearch"

placeholder="🔍 Search research..."

>


</div>






<div

id="researchList"

class="researchGrid"

>


<div class="card">

Loading researches...

</div>


</div>



</section>






</main>








<footer>


<p>

© 2026 Magsikhay Research Portal

<br>

Admin Management System

</p>


</footer>







<script type="module" src="js/authGuard.js"></script>


<script type="module" src="js/admin.js"></script>


<script src="js/theme.js"></script>



</body>


</html>
